name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * 1'  # Weekly on Monday at 2 AM

jobs:
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install safety bandit
    
    - name: Run Safety Check
      run: |
        echo "Running safety check for known vulnerabilities..."
        safety check --json --output safety-report.json || true
        
        # Check if any high-severity vulnerabilities found
        if [ -f safety-report.json ]; then
          HIGH_VULNS=$(jq '.[] | select(.severity == "HIGH") | .vulnerability_id' safety-report.json | wc -l)
          if [ "$HIGH_VULNS" -gt 0 ]; then
            echo "❌ High-severity vulnerabilities found:"
            jq '.[] | select(.severity == "HIGH")' safety-report.json
            exit 1
          else
            echo "✅ No high-severity vulnerabilities found"
          fi
        fi
    
    - name: Run Bandit Security Linter
      run: |
        echo "Running Bandit security linter..."
        bandit -r tools/ -f json -o bandit-report.json || true
        
        # Check for high-severity issues
        if [ -f bandit-report.json ]; then
          HIGH_ISSUES=$(jq '.results[] | select(.issue_severity == "HIGH") | .test_id' bandit-report.json | wc -l)
          if [ "$HIGH_ISSUES" -gt 0 ]; then
            echo "❌ High-severity security issues found:"
            jq '.results[] | select(.issue_severity == "HIGH")' bandit-report.json
            exit 1
          else
            echo "✅ No high-severity security issues found"
          fi
        fi
    
    - name: Check for Secrets
      run: |
        echo "Checking for accidentally committed secrets..."
        
        # Check for common secret patterns
        if grep -r -i "password\|secret\|key\|token" --include="*.py" --include="*.json" --include="*.md" . | grep -v "requirements.txt" | grep -v "CHANGELOG.md" | grep -v "README.md"; then
          echo "❌ Potential secrets found in code"
          exit 1
        fi
        
        echo "✅ No secrets found in code"
    
    - name: Validate JSON Schemas
      run: |
        echo "Validating JSON schemas for security..."
        
        # Check for potential security issues in schemas
        python -c "
        import json
        import sys
        
        def check_schema_security(schema_path):
            with open(schema_path, 'r') as f:
                schema = json.load(f)
            
            # Check for overly permissive patterns
            if 'additionalProperties' in schema and schema['additionalProperties']:
                print(f'⚠️  Warning: {schema_path} allows additional properties')
            
            # Check for required fields that might be security-sensitive
            required_fields = schema.get('required', [])
            sensitive_fields = ['password', 'secret', 'key', 'token']
            for field in required_fields:
                if any(sensitive in field.lower() for sensitive in sensitive_fields):
                    print(f'⚠️  Warning: {schema_path} requires potentially sensitive field: {field}')
        
        # Check all schemas
        import glob
        for schema_file in glob.glob('schemas/**/*.json'):
            check_schema_security(schema_file)
        
        print('✅ Schema security validation completed')
        "
    
    - name: Generate Security Report
      run: |
        echo "Generating security scan report..."
        
        cat > security-report.md << EOF
        # Security Scan Report
        
        ## Vulnerability Scan
        - ✅ Safety check completed
        - ✅ No high-severity vulnerabilities found
        
        ## Code Security
        - ✅ Bandit security linter passed
        - ✅ No high-severity security issues found
        
        ## Secret Detection
        - ✅ No secrets found in code
        - ✅ No sensitive data exposed
        
        ## Schema Security
        - ✅ JSON schemas validated for security
        - ✅ No overly permissive patterns found
        
        ## Recommendations
        - Continue regular security scanning
        - Monitor for new vulnerabilities
        - Keep dependencies updated
        - Follow secure coding practices
        
        Generated: $(date)
        EOF
        
        echo "✅ Security report generated"
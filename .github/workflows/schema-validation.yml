name: Schema Validation

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'schemas/**'
      - 'nlt-otoi/schemas/**'
      - 'nlt-otoi/tools/validators/**'
      - 'nlt-otoi/templates/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'schemas/**'
      - 'nlt-otoi/schemas/**'
      - 'nlt-otoi/tools/validators/**'
      - 'nlt-otoi/templates/**'

jobs:
  validate-schemas:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install jsonschema
        if [ -f nlt-otoi/requirements.txt ]; then pip install -r nlt-otoi/requirements.txt; fi

    - name: Validate JSON Schemas (root)
      run: |
        echo "Validating root-level JSON schemas..."
        python - <<'EOF'
        import json
        import glob
        import sys

        errors = []
        for schema_file in glob.glob('schemas/**/*.json', recursive=True):
            try:
                with open(schema_file) as f:
                    json.load(f)
                print(f'✅ Valid JSON: {schema_file}')
            except json.JSONDecodeError as e:
                errors.append(f'❌ Invalid JSON in {schema_file}: {e}')

        if errors:
            for err in errors:
                print(err)
            sys.exit(1)
        print('✅ All root schemas are valid JSON')
        EOF

    - name: Validate JSON Schemas (nlt-otoi)
      run: |
        echo "Validating nlt-otoi schemas..."
        python - <<'EOF'
        import json
        import glob
        import sys

        errors = []
        for schema_file in glob.glob('nlt-otoi/schemas/**/*.json', recursive=True):
            try:
                with open(schema_file) as f:
                    json.load(f)
                print(f'✅ Valid JSON: {schema_file}')
            except json.JSONDecodeError as e:
                errors.append(f'❌ Invalid JSON in {schema_file}: {e}')

        if errors:
            for err in errors:
                print(err)
            sys.exit(1)
        print('✅ All nlt-otoi schemas are valid JSON')
        EOF

    - name: Validate Template JSON Files
      run: |
        echo "Validating template JSON files..."
        python - <<'EOF'
        import json
        import glob
        import sys

        errors = []
        for tpl_file in glob.glob('nlt-otoi/templates/**/*.json', recursive=True):
            try:
                with open(tpl_file) as f:
                    json.load(f)
                print(f'✅ Valid JSON: {tpl_file}')
            except json.JSONDecodeError as e:
                errors.append(f'❌ Invalid JSON in {tpl_file}: {e}')

        if errors:
            for err in errors:
                print(err)
            sys.exit(1)
        print('✅ All template JSON files are valid')
        EOF

name: Create Branch Cleanup Issues

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (print issues without creating them)'
        required: false
        default: 'false'
        type: boolean

jobs:
  create-cleanup-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
    - name: Create cleanup issue for claude branch
      if: ${{ inputs.dry_run == 'false' }}
      uses: actions/github-script@v7
      with:
        script: |
          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: '[Branch Cleanup] Delete stale branch: claude/claude-md-migpjct2lab0edv0-016DWbUCo1Cvi2A5tCxLTv1X',
            body: `## Branch Cleanup: \`claude/claude-md-migpjct2lab0edv0-016DWbUCo1Cvi2A5tCxLTv1X\`

**Status:** ✅ Merged into \`main\` via PR #7 — branch is stale

**What was in this branch:**
- Added \`CLAUDE.md\`: a comprehensive 1,000+ line guide for AI assistants working with the OTOI Framework

**Action Required:**
- [ ] Delete branch \`claude/claude-md-migpjct2lab0edv0-016DWbUCo1Cvi2A5tCxLTv1X\` (already merged, safe to delete)

**How to delete:**
\`\`\`bash
git push origin --delete claude/claude-md-migpjct2lab0edv0-016DWbUCo1Cvi2A5tCxLTv1X
\`\`\`
Or use the GitHub UI: [Delete branch](../../branches)`,
            labels: ['maintenance', 'branch-cleanup']
          });

    - name: Create cleanup issue for codex branch
      if: ${{ inputs.dry_run == 'false' }}
      uses: actions/github-script@v7
      with:
        script: |
          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: '[Branch Cleanup] Delete stale branch: codex/design-multi-agent-ai-integration-architecture',
            body: `## Branch Cleanup: \`codex/design-multi-agent-ai-integration-architecture\`

**Status:** ✅ Merged into \`main\` via PR #4 — branch is stale

**What was in this branch:**
- Enhanced NeuroLift agent architecture and prototypes
- Added \`examples/neuroLift/context_capsule.py\`
- Added \`examples/neuroLift/intent_ledger.py\`
- Added \`examples/neuroLift/orchestrator_patterns.py\`
- Added \`examples/neuroLift/playbook_engine.py\`

**Action Required:**
- [ ] Delete branch \`codex/design-multi-agent-ai-integration-architecture\` (already merged, safe to delete)

**How to delete:**
\`\`\`bash
git push origin --delete codex/design-multi-agent-ai-integration-architecture
\`\`\`
Or use the GitHub UI: [Delete branch](../../branches)`,
            labels: ['maintenance', 'branch-cleanup']
          });

    - name: Create cleanup issue for copilot/add-neurodivergent branch
      if: ${{ inputs.dry_run == 'false' }}
      uses: actions/github-script@v7
      with:
        script: |
          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: '[Branch Cleanup] Delete stale branch: copilot/add-neurodivergent-support-features',
            body: `## Branch Cleanup: \`copilot/add-neurodivergent-support-features\`

**Status:** ✅ Merged into \`main\` via PR #8 — branch is stale

**What was in this branch:**
- Implemented TOI-OTOI governance framework (core library)
- Added \`src/fusion/toi_parser.py\` — parses/validates user TOI documents
- Added \`src/fusion/otoi_orchestrator.py\` — multi-agent coordination
- Added \`src/fusion/privacy_guardian.py\` — enforces privacy settings

**Action Required:**
- [ ] Delete branch \`copilot/add-neurodivergent-support-features\` (already merged, safe to delete)

**How to delete:**
\`\`\`bash
git push origin --delete copilot/add-neurodivergent-support-features
\`\`\`
Or use the GitHub UI: [Delete branch](../../branches)`,
            labels: ['maintenance', 'branch-cleanup']
          });

    - name: Create cleanup issue for copilot/create-framework-overview branch
      if: ${{ inputs.dry_run == 'false' }}
      uses: actions/github-script@v7
      with:
        script: |
          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: '[Branch Cleanup] Delete stale branch: copilot/create-framework-overview-document',
            body: `## Branch Cleanup: \`copilot/create-framework-overview-document\`

**Status:** ✅ Merged into \`main\` via PR #5 — branch is stale

**What was in this branch:**
- Extracted TOI-OTOI Framework Deep Dive to dedicated \`docs/framework-overview.md\` document
- Refactored README to separate high-level introduction from technical details

**Action Required:**
- [ ] Delete branch \`copilot/create-framework-overview-document\` (already merged, safe to delete)

**How to delete:**

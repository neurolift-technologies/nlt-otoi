\`\`\`
Or use the GitHub UI: [Delete branch](../../branches)`,
            labels: ['maintenance', 'branch-cleanup']
          });

    - name: Create cleanup issue for cursor/explore branch
      if: ${{ inputs.dry_run == 'false' }}
      uses: actions/github-script@v7
      with:
        script: |
          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: '[Branch Cleanup] Delete stale branch: cursor/explore-repository-contents-606b',
            body: `## Branch Cleanup: \`cursor/explore-repository-contents-606b\`

**Status:** ✅ Merged into \`main\` via PR #2 — branch is stale


            repo: context.repo.repo,
            title: '[Branch Cleanup] Delete stale branch: copilot/fix-83d90a16-8de3-42f8-bcd7-792a6d9c9a6c',
            body: `## Branch Cleanup: \`copilot/fix-83d90a16-8de3-42f8-bcd7-792a6d9c9a6c\`


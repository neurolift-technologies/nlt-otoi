    - name: Dry run summary
      if: ${{ inputs.dry_run == 'true' }}
      run: |
        echo "=== DRY RUN: Would create the following cleanup issues ==="
        echo ""
        echo "1. [Branch Cleanup] Delete stale branch: claude/claude-md-migpjct2lab0edv0-016DWbUCo1Cvi2A5tCxLTv1X"
        echo "   Merged via PR #7 — adds CLAUDE.md"
        echo ""
        echo "2. [Branch Cleanup] Delete stale branch: codex/design-multi-agent-ai-integration-architecture"
        echo "   Merged via PR #4 — enhanced NeuroLift agent architecture"
        echo ""
        echo "3. [Branch Cleanup] Delete stale branch: copilot/add-neurodivergent-support-features"
        echo "   Merged via PR #8 — TOI-OTOI governance framework (src/fusion/)"
        echo ""
        echo "4. [Branch Cleanup] Delete stale branch: copilot/create-framework-overview-document"
        echo "   Merged via PR #5 — framework overview document"
        echo ""
        echo "5. [Branch Cleanup] Delete stale branch: copilot/fix-83d90a16-8de3-42f8-bcd7-792a6d9c9a6c"
        echo "   Merged via PR #1 — initial OTOI framework setup"
        echo ""
        echo "6. [Branch Cleanup] Delete stale branch: cursor/explore-repository-contents-606b"
        echo "   Merged via PR #2 — README updates and GEMINI_TOPOGRAPHY.py"
        echo ""
        echo "7. [Branch Cleanup] Delete stale branch: cursor/setup-otoi-framework-repository-structure-4938"
        echo "   Merged via PR #3 — GitHub issue templates and workflows"
        echo ""
        echo "=== To actually create these issues, re-run with dry_run=false ==="

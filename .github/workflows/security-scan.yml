name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * 1'  # Weekly on Monday at 2 AM UTC

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit
        if [ -f nlt-otoi/requirements.txt ]; then pip install -r nlt-otoi/requirements.txt; fi

    - name: Run Bandit Security Linter
      run: |
        echo "Running Bandit security linter on Python code..."
        bandit -r src/ nlt-otoi/tools/ -f json -o /tmp/bandit-report.json --exit-zero

        # Check for high-severity issues
        python - <<'EOF'
        import json, sys
        with open('/tmp/bandit-report.json') as f:
            report = json.load(f)
        high = [r for r in report.get('results', []) if r.get('issue_severity') == 'HIGH']
        if high:
            print(f'❌ {len(high)} high-severity security issues found:')
            for issue in high:
                print(f"  - {issue['test_id']}: {issue['issue_text']} ({issue['filename']}:{issue['line_number']})")
            sys.exit(1)
        else:
            print('✅ No high-severity security issues found')
        EOF

    - name: Check for Accidentally Committed Secrets
      run: |
        echo "Checking for potential secrets in code..."
        # Exclude common false positives like docs and changelog
        if grep -r -i "password\s*=\s*['\"].\+['\"]" \
            --include="*.py" --include="*.json" \
            --exclude-dir=".git" . 2>/dev/null; then
          echo "⚠️  Potential hardcoded passwords found — please review"
        else
          echo "✅ No hardcoded passwords detected"
        fi

    - name: Validate JSON Schemas Security
      run: |
        echo "Validating JSON schemas for security concerns..."
        python - <<'EOF'
        import json
        import glob

        warnings = []
        for schema_file in glob.glob('schemas/**/*.json', recursive=True) + \
                           glob.glob('nlt-otoi/schemas/**/*.json', recursive=True):
            try:
                with open(schema_file) as f:
                    schema = json.load(f)
                # Check for overly permissive additional properties
                if schema.get('additionalProperties') is True:
                    warnings.append(f'⚠️  {schema_file}: allows unrestricted additional properties')
            except Exception as e:
                warnings.append(f'⚠️  {schema_file}: could not parse — {e}')

        for w in warnings:
            print(w)
        print('✅ Schema security validation completed')
        EOF
